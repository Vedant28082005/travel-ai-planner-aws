version: "3.8"

services:
  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - ai-service
      - data-service
      - pdf-service
      - frontend

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Expose backend APIs to the frontend via browser or server-side
      - NEXT_PUBLIC_API_URL=http://localhost:80

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    env_file: .env

  ai-service:
    build: ./services/ai-service
    ports:
      - "8002:8002"
    env_file: .env

  data-service:
    build: ./services/data-service
    ports:
      - "8003:8003"
    env_file: .env

  pdf-service:
    build: ./services/pdf-service
    ports:
      - "8005:8005"
    env_file: .env

  user-service:
    build: ./services/user-service
    ports:
      - "8007:8007"
    env_file: .env

  live-status-service:
    build: ./services/live-status-service
    ports:
      - "8006:8006"
    env_file: .env
